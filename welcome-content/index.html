<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Auto-refresh so the page flips to the app as soon as the WAR finishes deploying. -->
    <meta http-equiv="refresh" content="4" />
    <title>Starting up…</title>
    <style>
        body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
               display: flex; min-height: 100vh; margin: 0; align-items: center;
               justify-content: center; background: #f6f8fa; color: #24292f; }
        .card { text-align: center; padding: 2.5rem 3rem; background: #fff;
                border: 1px solid #d0d7de; border-radius: 12px;
                box-shadow: 0 1px 3px rgba(27,31,36,.08); }
        .spinner { width: 36px; height: 36px; margin: 0 auto 1.25rem;
                   border: 4px solid #d0d7de; border-top-color: #0969da;
                   border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        h1 { font-size: 1.25rem; margin: 0 0 .5rem; }
        p { margin: 0; color: #57606a; }
    </style>
</head>
<body>
    <div class="card">
        <div class="spinner"></div>
        <h1>Still loading the app…</h1>
        <p>Please check again in a moment. This page refreshes automatically.</p>
    </div>
</body>
</html>
